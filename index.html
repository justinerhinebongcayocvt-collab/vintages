<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800 antialiased">

    <nav class="fixed w-full z-50 transition-all duration-300 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-2xl font-bold text-blue-600">Stop and Thrift</a>
                </div>

                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="hover:text-blue-600 transition font-medium">Home</a>
                    <a href="products.html" class="hover:text-blue-600 transition font-medium">Products</a>
                    <a href="About.html" class="hover:text-blue-600 transition font-medium">About</a>
                    <a href="minigames.html" class="hover:text-blue-600 transition font-medium">Games</a>
                    <a href="contact.html" class="hover:text-blue-600 transition font-medium">Contact</a>
                   
                </div>

                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="p-2 text-gray-600 hover:text-blue-600">
                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-gray-100 px-4 py-6 space-y-3">
            <a href="index.html" class="block text-lg font-medium py-2 border-b border-gray-50">Home</a>
            <a href="products.html" class="block text-lg font-medium py-2 border-b border-gray-50">Products/a>
            <a href="About.html" class="block text-lg font-medium py-2 border-b border-gray-50">About</a>
            <a href="minigames.html" class="block text-lg font-medium py-2 border-b border-gray-50">Games</a>
            <a href="contact.html" class="block text-lg font-medium py-2 border-b border-gray-50">Contact</a>
            <button class="w-full mt-4 bg-blue-600 text-white py-3 rounded-xl font-bold">Join Now</button>
        </div>
    </nav>

    <main class="pt-32 pb-20">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <div class="text-center mb-12">
                <h1 class="text-4xl md:text-6xl font-black text-gray-900 mb-4">
                    <span class="text-blue-600">VINTAGE CLOTHES</span>
                </h1>
                <p class="text-gray-500 text-lg"></p>
            </div>

            <div class="relative w-full aspect-video overflow-hidden rounded-3xl shadow-2xl border border-gray-100 bg-gray-50">
                <img 
                    src="images/main'.jpg" 
                    alt="Page Image" 
                    class="w-full h-full object-cover"
                />
            </div>

            <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="rounded-2xl overflow-hidden h-64 bg-gray-200">
                    <img src="images/1.jpg" class="w-full h-full object-cover" alt="img1">
                </div>
                <div class="rounded-2xl overflow-hidden h-64 bg-gray-200">
                    <img src="images/2.jpg" class="w-full h-full object-cover" alt="img2">
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-gray-50 py-12 border-t border-gray-100">
        <div class="text-center text-gray-400">
            <p>&copy; 2026 Stop and Thrift</p>
        </div>
    </footer>

    <script>
        const menuBtn = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>

</body>
</html>
