                    </button>
                </div>

                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="p-2 text-gray-600 hover:text-blue-600 focus:outline-none">

                <div class="group relative rounded-2xl overflow-hidden h-96 bg-gray-100 border border-gray-100 shadow-md">
