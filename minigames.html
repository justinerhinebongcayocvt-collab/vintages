<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop and Thrift | Thrift Catch Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas {
            display: block;
            background: #f9fafb; /* Light gray background for game */
            touch-action: none; /* Prevents scrolling while playing on mobile */
        }
    </style>
</head>
<body class="bg-white text-gray-800 antialiased overflow-x-hidden">

    <nav class="fixed w-full z-50 transition-all duration-300 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-2xl font-bold text-blue-600">Stop and Thrift</a>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="hover:text-blue-600 transition font-medium">Home</a>
                    <a href="products.html" class="hover:text-blue-600 transition font-medium">Products</a>
                    <a href="About.html" class="hover:text-blue-600 transition font-medium">About</a>
                    <a href="minigames.html" class="hover:text-blue-600 transition font-medium">Games</a>
                    <a href="contact.html" class="hover:text-blue-600 transition font-medium">Contact</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="p-2 text-gray-600 hover:text-blue-600">
                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-gray-100 px-4 py-6 space-y-3">
            <a href="index.html" class="block text-lg font-medium py-2 border-b border-gray-50">Home</a>
            <a href="products.html" class="block text-lg font-medium py-2 border-b border-gray-50">Products</a>
            <a href="About.html" class="block text-lg font-medium py-2 border-b border-gray-50">About</a>
            <a href="minigames.html" class="block text-lg font-medium py-2 border-b border-gray-50">Games</a>
            <a href="contact.html" class="block text-lg font-medium py-2 border-b border-gray-50">Contact</a>
        </div>
    </nav>

    <main class="pt-24 flex flex-col items-center">
        <div class="text-center mb-4 px-4">
            <h1 class="text-3xl md:text-5xl font-black text-gray-900">THRIFT <span class="text-blue-600">CATCH</span></h1>
            <p class="text-gray-500">Catch the falling clothes! Drag to move.</p>
            <div class="mt-2 text-xl font-bold text-blue-600">Score: <span id="scoreText">0</span> | Misses: <span id="missText">0</span>/3</div>
        </div>

        <div id="game-container" class="relative w-full max-w-2xl border-4 border-blue-100 rounded-3xl overflow-hidden shadow-2xl bg-white aspect-[3/4] md:aspect-video">
            <canvas id="gameCanvas"></canvas>
            
            <div id="gameOver" class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center p-6 text-center">
                <h2 class="text-4xl font-black text-red-600 mb-2">GAME OVER</h2>
                <p id="finalScore" class="text-2xl font-bold mb-6 text-gray-800"></p>
                <button onclick="resetGame()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition">Play Again</button>
            </div>
        </div>
    </main>

    <footer class="mt-10 py-10 text-center text-gray-400 border-t border-gray-50">
        <p>&copy; 2026 Stop and Thrift - Game Mode</p>
    </footer>

    <script>
        // Navbar Toggle
        const menuBtn = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

        // GAME LOGIC
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreText');
        const missDisplay = document.getElementById('missText');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreText = document.getElementById('finalScore');

        let score = 0;
        let misses = 0;
        let gameActive = true;
        let items = [];
        let itemTypes = ['👕', '👖', '👟', '👒', '🧥'];
        
        // Player (Shopping Bag)
        const player = {
            width: 80,
            height: 60,
            x: 0,
            y: 0,
            emoji: '🛍️'
        };

        function resizeCanvas() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            player.y = canvas.height - 70;
            player.x = (canvas.width / 2) - (player.width / 2);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Control Logic (Mouse & Touch)
        function movePlayer(e) {
            if(!gameActive) return;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = canvas.getBoundingClientRect();
            let newX = clientX - rect.left - (player.width / 2);
            
            // Boundary checks
            if (newX < 0) newX = 0;
            if (newX > canvas.width - player.width) newX = canvas.width - player.width;
            player.x = newX;
        }

        canvas.addEventListener('mousemove', movePlayer);
        canvas.addEventListener('touchmove', (e) => {
            movePlayer(e);
            e.preventDefault();
        }, { passive: false });

        function spawnItem() {
            if(!gameActive) return;
            const x = Math.random() * (canvas.width - 40);
            items.push({
                x: x,
                y: -50,
                speed: 2 + Math.random() * 3 + (score / 10), // Speed increases as you score
                emoji: itemTypes[Math.floor(Math.random() * itemTypes.length)]
            });
            setTimeout(spawnItem, Math.max(400, 1000 - (score * 10)));
        }

        function resetGame() {
            score = 0;
            misses = 0;
            items = [];
            gameActive = true;
            scoreDisplay.innerText = score;
            missDisplay.innerText = misses;
            gameOverScreen.classList.add('hidden');
            update();
        }

        function update() {
            if(!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            ctx.font = '50px serif';
            ctx.fillText(player.emoji, player.x, player.y + 40);

            // Draw Items
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.speed;
                ctx.fillText(item.emoji, item.x, item.y);

                // Collision Detection
                if (
                    item.y > player.y && 
                    item.y < player.y + player.height &&
                    item.x > player.x - 20 &&
                    item.x < player.x + player.width
                ) {
                    items.splice(i, 1);
                    score++;
                    scoreDisplay.innerText = score;
                } 
                // Missed item
                else if (item.y > canvas.height) {
                    items.splice(i, 1);
                    misses++;
                    missDisplay.innerText = misses;
                    if(misses >= 3) {
                        gameActive = false;
                        finalScoreText.innerText = "You caught " + score + " items!";
                        gameOverScreen.classList.remove('hidden');
                    }
                }
            }

            requestAnimationFrame(update);
        }

        spawnItem();
        update();
    </script>
</body>
</html>
